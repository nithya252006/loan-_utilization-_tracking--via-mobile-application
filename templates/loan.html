<!DOCTYPE html>
<html>
<head>
    <title>Add Loan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="header">
    <h2>Add Loan</h2>
    <a class="btn btn-danger" href="/logout">Logout</a>
</div>

<div class="container">
    <div class="card" style="width:400px; margin:auto;">

        <h3>Welcome {{ user }}</h3>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for m in messages %}<p style="color:red;">{{ m }}</p>{% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="/add_loan">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="number" step="0.01" min="1" name="amount" placeholder="Amount" required>

            <label>Purpose</label>
            <select name="purpose" required>
                <option value="" disabled selected>Select loan purpose</option>
                {% for p in purposes %}
                <option value="{{ p }}">{{ p }}</option>
                {% endfor %}
            </select>

            <label>Loan Date</label>
            <input type="date" name="loan_date" required>

            <button class="btn btn-success" type="submit">Add Loan</button>
        </form>

        <a class="btn btn-primary" href="/dashboard">Back</a>

    </div>
</div>

</body>
</html>
