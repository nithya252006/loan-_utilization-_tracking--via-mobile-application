<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">
    <div class="card" style="width:350px; margin:auto; margin-top:100px; text-align:center;">

        <h2>Customer Login</h2>

        {% if error %}
        <p style="color:red;">{{ error }}</p>
        {% endif %}
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for m in messages %}<p style="color:#007BFF;">{{ m }}</p>{% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button class="login-btn" type="submit">Login</button>
        </form>

        <p>New user? <a href="{{ url_for('register') }}">Register</a></p>
        <p><a href="{{ url_for('officer_login') }}">Officer Login</a></p>

    </div>
</div>

</body>
</html>
